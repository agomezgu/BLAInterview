services:
  postgres:
    image: postgres:16-alpine
    container_name: bla-interview-postgres
    environment:
      POSTGRES_DB: bla_interview
      POSTGRES_USER: bla
      POSTGRES_PASSWORD: bla_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bla -d bla_interview"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
